<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="460" fill="#0f172a" rx="16"/>

  <!-- ── Column 1: Agent ── -->
  <rect x="20" y="140" width="140" height="90" rx="12" fill="#1e1b4b" stroke="#6d28d9" stroke-width="2"/>
  <text x="90" y="178" text-anchor="middle" fill="#a78bfa" font-size="26">🤖</text>
  <text x="90" y="200" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">AI Agent</text>
  <text x="90" y="216" text-anchor="middle" fill="#94a3b8" font-size="10">Claude Code / MCP</text>

  <!-- Arrow 1 → Gateway -->
  <line x1="160" y1="185" x2="218" y2="185" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="189" y="177" text-anchor="middle" fill="#64748b" font-size="10">POST contract</text>

  <!-- ── Column 2: Gateway ── -->
  <rect x="220" y="140" width="140" height="90" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="290" y="178" text-anchor="middle" fill="#94a3b8" font-size="26">🔒</text>
  <text x="290" y="200" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Gateway</text>
  <text x="290" y="216" text-anchor="middle" fill="#94a3b8" font-size="10">Express.js</text>

  <!-- Arrow: Gateway → Agent (402) -->
  <path d="M 220 215 Q 185 265 160 215" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrRed)"/>
  <text x="185" y="278" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">HTTP 402</text>
  <text x="185" y="292" text-anchor="middle" fill="#ef4444" font-size="10">Payment Required</text>

  <!-- Arrow: Agent → Stellar (down) -->
  <line x1="90" y1="230" x2="90" y2="305" stroke="#10b981" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="104" y="272" fill="#10b981" font-size="10">0.15 USDC</text>

  <!-- ── Stellar ── -->
  <rect x="20" y="307" width="140" height="75" rx="12" fill="#022c22" stroke="#10b981" stroke-width="2"/>
  <text x="90" y="333" text-anchor="middle" fill="#6ee7b7" font-size="20">⭐</text>
  <text x="90" y="352" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Stellar Testnet</text>
  <text x="90" y="368" text-anchor="middle" fill="#6ee7b7" font-size="10">0.15 USDC paid</text>

  <!-- Arrow: Stellar → Gateway (verified) -->
  <path d="M 160 344 Q 210 344 220 250" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <text x="220" y="340" text-anchor="middle" fill="#10b981" font-size="10">verified</text>
  <text x="220" y="353" text-anchor="middle" fill="#10b981" font-size="10">on-chain</text>

  <!-- Arrow: Gateway → RAG -->
  <line x1="360" y1="185" x2="408" y2="185" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="384" y="177" text-anchor="middle" fill="#64748b" font-size="10">contract</text>

  <!-- ── Column 3: RAG ── -->
  <rect x="410" y="128" width="150" height="114" rx="12" fill="#1a1207" stroke="#d97706" stroke-width="2"/>
  <text x="485" y="152" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">RAG Retrieval</text>
  <line x1="428" y1="160" x2="542" y2="160" stroke="#78350f" stroke-width="1"/>
  <text x="485" y="176" text-anchor="middle" fill="#a8a29e" font-size="10">embed contract code</text>
  <text x="485" y="192" text-anchor="middle" fill="#a8a29e" font-size="10">cosine similarity search</text>
  <text x="485" y="208" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">top-4 security docs</text>
  <text x="485" y="224" text-anchor="middle" fill="#64748b" font-size="9">all-MiniLM-L6-v2 · local</text>
  <text x="485" y="236" text-anchor="middle" fill="#78350f" font-size="9">7 curated Soroban docs</text>

  <!-- Arrow: RAG → AI Engine -->
  <line x1="560" y1="185" x2="608" y2="185" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="584" y="177" text-anchor="middle" fill="#64748b" font-size="10">context</text>

  <!-- ── Column 4: AI Engine ── -->
  <rect x="610" y="110" width="175" height="160" rx="12" fill="#1c1917" stroke="#f59e0b" stroke-width="2"/>
  <text x="697" y="137" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">Two-Pass AI Engine</text>
  <line x1="628" y1="145" x2="767" y2="145" stroke="#78350f" stroke-width="1"/>

  <rect x="628" y="152" width="138" height="44" rx="8" fill="#292524" stroke="#d97706" stroke-width="1"/>
  <text x="697" y="169" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Pass 1 — Reasoning</text>
  <text x="697" y="185" text-anchor="middle" fill="#a8a29e" font-size="9">Auth · Arithmetic · Storage</text>

  <rect x="628" y="204" width="138" height="44" rx="8" fill="#292524" stroke="#d97706" stroke-width="1"/>
  <text x="697" y="221" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Pass 2 — Findings</text>
  <text x="697" y="237" text-anchor="middle" fill="#a8a29e" font-size="9">CWE IDs · Severity · Fix</text>

  <!-- Arrow: AI → Report -->
  <line x1="785" y1="185" x2="823" y2="185" stroke="#6d28d9" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="804" y="177" text-anchor="middle" fill="#7c3aed" font-size="10">report</text>

  <!-- ── Column 5: Report ── -->
  <rect x="825" y="130" width="115" height="120" rx="12" fill="#1e1b4b" stroke="#6d28d9" stroke-width="2"/>
  <text x="882" y="153" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">Audit Report</text>
  <line x1="840" y1="160" x2="925" y2="160" stroke="#3730a3" stroke-width="1"/>
  <text x="882" y="177" text-anchor="middle" fill="#e2e8f0" font-size="10">CRITICAL · HIGH · MED</text>
  <text x="882" y="193" text-anchor="middle" fill="#94a3b8" font-size="9">CWE IDs + exact fix</text>
  <text x="882" y="208" text-anchor="middle" fill="#94a3b8" font-size="9">Chain-of-thought</text>
  <text x="882" y="223" text-anchor="middle" fill="#94a3b8" font-size="9">Stellar tx proof</text>

  <!-- Protocol badges -->
  <rect x="230" y="410" width="110" height="26" rx="13" fill="#1d4ed8"/>
  <text x="285" y="428" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">x402 Protocol</text>

  <rect x="355" y="410" width="145" height="26" rx="13" fill="#0891b2"/>
  <text x="427" y="428" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">Stripe MPP Protocol</text>

  <text x="205" y="428" text-anchor="middle" fill="#475569" font-size="10">supports →</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6d28d9"/>
    </marker>
  </defs>

</svg>
