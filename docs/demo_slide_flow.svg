<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="420" fill="#0f172a" rx="16"/>

  <!-- ── Column 1: Agent ── -->
  <rect x="30" y="140" width="150" height="100" rx="12" fill="#1e1b4b" stroke="#6d28d9" stroke-width="2"/>
  <text x="105" y="182" text-anchor="middle" fill="#a78bfa" font-size="28">🤖</text>
  <text x="105" y="205" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">AI Agent</text>
  <text x="105" y="222" text-anchor="middle" fill="#94a3b8" font-size="11">Claude Code / MCP</text>

  <!-- Arrow 1 → -->
  <line x1="180" y1="190" x2="248" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="214" y="181" text-anchor="middle" fill="#64748b" font-size="10">POST contract</text>

  <!-- ── Column 2: Gateway ── -->
  <rect x="250" y="140" width="150" height="100" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="325" y="182" text-anchor="middle" fill="#94a3b8" font-size="28">🔒</text>
  <text x="325" y="205" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Gateway</text>
  <text x="325" y="222" text-anchor="middle" fill="#94a3b8" font-size="11">Express.js</text>

  <!-- 402 label — curved back arrow area -->
  <!-- Arrow 2: Gateway → back to Agent (402) — shown as label below -->
  <path d="M 250 220 Q 215 270 180 220" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrRed)"/>
  <text x="215" y="282" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">HTTP 402</text>
  <text x="215" y="296" text-anchor="middle" fill="#ef4444" font-size="10">Payment Required</text>

  <!-- Arrow 3: Agent → Stellar (down) -->
  <line x1="105" y1="240" x2="105" y2="305" stroke="#10b981" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- ── Column bottom: Stellar ── -->
  <rect x="30" y="307" width="150" height="80" rx="12" fill="#022c22" stroke="#10b981" stroke-width="2"/>
  <text x="105" y="337" text-anchor="middle" fill="#6ee7b7" font-size="22">⭐</text>
  <text x="105" y="358" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Stellar Testnet</text>
  <text x="105" y="374" text-anchor="middle" fill="#6ee7b7" font-size="11">0.15 USDC paid</text>

  <!-- Label on down arrow -->
  <text x="118" y="278" fill="#10b981" font-size="10">0.15 USDC</text>

  <!-- Arrow 4: Stellar → Gateway (payment verified) -->
  <path d="M 180 347 Q 240 347 250 260" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <text x="245" y="345" text-anchor="middle" fill="#10b981" font-size="10">verified</text>
  <text x="245" y="358" text-anchor="middle" fill="#10b981" font-size="10">on-chain</text>

  <!-- Arrow 5: Gateway → AI Engine -->
  <line x1="400" y1="190" x2="468" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="434" y="181" text-anchor="middle" fill="#64748b" font-size="10">contract</text>

  <!-- ── Column 3: AI Engine ── -->
  <rect x="470" y="110" width="200" height="160" rx="12" fill="#1c1917" stroke="#f59e0b" stroke-width="2"/>
  <text x="570" y="140" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">Two-Pass AI Engine</text>
  <line x1="490" y1="150" x2="650" y2="150" stroke="#78350f" stroke-width="1"/>

  <!-- Pass 1 -->
  <rect x="490" y="158" width="160" height="44" rx="8" fill="#292524" stroke="#d97706" stroke-width="1"/>
  <text x="570" y="175" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Pass 1 — Reasoning</text>
  <text x="570" y="192" text-anchor="middle" fill="#a8a29e" font-size="10">Auth · Arithmetic · Storage</text>

  <!-- Pass 2 -->
  <rect x="490" y="210" width="160" height="44" rx="8" fill="#292524" stroke="#d97706" stroke-width="1"/>
  <text x="570" y="227" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Pass 2 — Findings</text>
  <text x="570" y="244" text-anchor="middle" fill="#a8a29e" font-size="10">CWE IDs · Severity · Fix</text>

  <!-- Arrow 6: AI → Report -->
  <line x1="670" y1="190" x2="738" y2="190" stroke="#6d28d9" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="704" y="181" text-anchor="middle" fill="#7c3aed" font-size="10">report</text>

  <!-- ── Column 4: Report ── -->
  <rect x="740" y="130" width="180" height="120" rx="12" fill="#1e1b4b" stroke="#6d28d9" stroke-width="2"/>
  <text x="830" y="158" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">Audit Report</text>
  <line x1="760" y1="165" x2="900" y2="165" stroke="#3730a3" stroke-width="1"/>
  <text x="830" y="183" text-anchor="middle" fill="#e2e8f0" font-size="11">CRITICAL · HIGH · MEDIUM</text>
  <text x="830" y="200" text-anchor="middle" fill="#94a3b8" font-size="10">CWE IDs + exact fix</text>
  <text x="830" y="216" text-anchor="middle" fill="#94a3b8" font-size="10">Chain-of-thought reasoning</text>
  <text x="830" y="232" text-anchor="middle" fill="#94a3b8" font-size="10">Stellar tx URL (on-chain proof)</text>

  <!-- Protocol badges at bottom -->
  <rect x="270" y="372" width="120" height="28" rx="14" fill="#1d4ed8" stroke="none"/>
  <text x="330" y="391" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">x402 Protocol</text>

  <rect x="410" y="372" width="160" height="28" rx="14" fill="#0891b2" stroke="none"/>
  <text x="490" y="391" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Stripe MPP Protocol</text>

  <text x="245" y="391" text-anchor="middle" fill="#475569" font-size="11">supports →</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6d28d9"/>
    </marker>
  </defs>

</svg>
